repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (auto-fix)
        entry: ruff check --fix
        language: python
        additional_dependencies:
          - "ruff>=0.6,<1.0"
        types_or: [python, pyi]
        files: ^(src|tests|benchmark)/

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: python
        additional_dependencies:
          - "ruff>=0.6,<1.0"
        types_or: [python, pyi]
        files: ^(src|tests|benchmark)/
